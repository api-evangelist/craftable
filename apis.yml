aid: craftable
name: Craftable
description: >-
  Craftable is hospitality's back-office software platform for restaurants,
  bars, hotels, and resorts, originally known for its Bevager and Foodager
  products, that connects purchasing, inventory, recipes, and accounts payable
  with accounting and sales data. Its suite spans Intelligent Ordering
  (eProcurement), AP Automation with Invoice AI, Inventory and Recipe
  Management, and Daily Actionable Insights, plus AI features such as Operator
  AI and the Crafty in-app assistant. Craftable is SOC 2 compliant and
  SSO-capable, with more than 1,000 POS, EDI, and vendor/API integrations
  spanning systems such as Toast, Square, Lightspeed, Clover, SpotOn,
  TouchBistro, Aloha by NCR Voyix, Restaurant365, Sage Intacct, Oracle NetSuite,
  Acumatica, QuickBooks, and Xero. Craftable does not publish a public
  self-service developer portal, API documentation, or SDKs; integrations are
  delivered through its implementation team during onboarding, and API access to
  a connected platform is provisioned by requesting a scoped API key from that
  platform's support team.
