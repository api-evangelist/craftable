aid: craftable
name: Craftable
description: >-
  Craftable is a back-office software platform for restaurants and hotels,
  originally known for its Bevager and Foodager products, that connects
  purchasing, inventory, recipes, and accounts payable with accounting and
  sales data. It offers intelligent ordering, AP automation, inventory and
  recipe management, and AI-assisted invoice and operations tooling. Craftable
  is SOC 2 compliant and SSO-capable, with more than 1,000 POS, EDI, and API
  integrations spanning systems such as Toast, Square, Lightspeed, Clover,
  Restaurant365, Sage Intacct, and Xero. Craftable does not publish a public
  self-service developer portal; integrations are delivered through its team
  using custom templates and partner APIs.
