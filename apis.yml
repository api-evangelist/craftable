features:
  - name: Intelligent Ordering
    description: >-
      Centralized eProcurement and vendor order management with automated price
      discrepancy detection and purchase tracking across distributors.
  - name: AP Automation (Invoice AI)
    description: >-
      AI-powered invoice processing with automated purchase-order matching,
      discrepancy flagging, and approval routing into accounting platforms.
  - name: Inventory & Recipe Management
    description: >-
      Real-time inventory visibility with recipe and menu cost tracking and
      variance detection against theoretical usage synced from the POS.
  - name: Daily Actionable Insights
    description: >-
      Unified dashboard consolidating food cost, labor, and purchasing data with
      variance trending and business intelligence.
  - name: Operator AI
    description: >-
      Ranked daily insights surfacing opportunities and suggested actions for
      operators across cost, labor, and purchasing data.
  - name: Crafty AI Assistant
    description: >-
      In-app conversational AI assistant that answers profitability and
      operations questions using live restaurant data.
use_cases:
  - name: Reduce Food Costs
    description: >-
      Operators using Craftable report an average 5% reduction in food costs
      through inventory variance tracking and recipe costing.
  - name: Minimize Rogue Spend
    description: >-
      Centralized purchasing and price discrepancy detection drive a reported
      30% improvement in controlling off-program and rogue spend.
  - name: Decrease Inventory Time
    description: >-
      Mobile inventory counting and POS-synced depletions reduce time spent on
      inventory by a reported 50%.
integrations:
  - name: Point Of Sale
    description: >-
