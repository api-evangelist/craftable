  - name: Accounting & ERP
    description: >-
      35+ accounting and ERP integrations including QuickBooks, Sage Intacct,
      Oracle NetSuite, Acumatica, Microsoft Dynamics GP, Bill.com,
      Restaurant365, and Xero.
  - name: Food & Beverage Distributors
